<!-- Renamed from admin/simple.html (Auth debug page) -->
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YUMMY - Admin Auth Debug</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      body {
        font-family: "Be Vietnam Pro", sans-serif;
        background: #f6f7f9;
        margin: 0;
        padding: 2rem;
      }
      h1 {
        text-align: center;
      }
      .auth-container {
        max-width: 420px;
        margin: 0 auto;
        background: #fff;
        padding: 1.5rem 2rem;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .toggle {
        text-align: center;
        margin-bottom: 1rem;
      }
      .toggle button {
        background: none;
        border: none;
        font-weight: 600;
        cursor: pointer;
        padding: 0.5rem 1rem;
      }
      .toggle button.active {
        color: #d35400;
        border-bottom: 2px solid #d35400;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      input {
        padding: 0.6rem 0.8rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }
      button.primary {
        background: #d35400;
        color: #fff;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
      }
      .message {
        margin-top: 1rem;
        font-size: 14px;
        min-height: 20px;
      }
      .back-links {
        text-align: center;
        margin-top: 1rem;
      }
      a {
        color: #d35400;
        text-decoration: none;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1>Admin Auth Debug</h1>
    <div class="auth-container">
      <div class="toggle">
        <button id="btn-login" class="active">Đăng nhập</button>
        <button id="btn-signup">Đăng ký</button>
      </div>
      <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Mật khẩu" required />
        <button type="submit" class="primary" id="submit-btn">Đăng nhập</button>
      </form>
      <div class="message" id="message"></div>
      <div class="back-links">
        <a href="../landing-home.html">Trang chủ</a> ·
        <a href="../admin/admin-panel.html">Admin Panel</a>
      </div>
    </div>

    <script type="module">
      import {
        initializeApp,
        getApps,
        getApp,
      } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCbUNjBPEaZOtI_cNCcCJ1DBXUUdrP_6oE",
        authDomain: "order-yummy.firebaseapp.com",
        projectId: "order-yummy",
        storageBucket: "order-yummy.firebasestorage.app",
        messagingSenderId: "142798840175",
        appId: "1:142798840175:web:1091d97784312c1fe4089a",
        measurementId: "G-GQ7MEPZSSJ",
      };
      const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      async function ensureAdmin(uid) {
        const ref = doc(db, "users", uid);
        const snap = await getDoc(ref);
        if (!snap.exists()) {
          await setDoc(ref, { role: "admin", createdAt: Date.now() });
        }
      }

      const form = document.getElementById("auth-form");
      const btnLogin = document.getElementById("btn-login");
      const btnSignup = document.getElementById("btn-signup");
      const submitBtn = document.getElementById("submit-btn");
      const messageEl = document.getElementById("message");
      let mode = "login";

      btnLogin.addEventListener("click", () => {
        mode = "login";
        btnLogin.classList.add("active");
        btnSignup.classList.remove("active");
        submitBtn.textContent = "Đăng nhập";
        messageEl.textContent = "";
      });
      btnSignup.addEventListener("click", () => {
        mode = "signup";
        btnSignup.classList.add("active");
        btnLogin.classList.remove("active");
        submitBtn.textContent = "Đăng ký";
        messageEl.textContent = "";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        messageEl.textContent = "Đang xử lý...";
        try {
          if (mode === "signup") {
            const cred = await createUserWithEmailAndPassword(
              auth,
              email,
              password
            );
            await ensureAdmin(cred.user.uid);
            messageEl.textContent = "Tạo tài khoản & gán admin OK!";
          } else {
            await signInWithEmailAndPassword(auth, email, password);
            messageEl.textContent = "Đăng nhập thành công!";
          }
          setTimeout(() => (location.href = "./admin-panel.html"), 800);
        } catch (err) {
          console.error(err);
          messageEl.textContent = "Lỗi: " + (err.code || err.message);
        }
      });

      onAuthStateChanged(auth, (user) => {
        if (user) {
          messageEl.textContent = "Đang đăng nhập: " + user.email;
        }
      });
    </script>
  </body>
</html>
