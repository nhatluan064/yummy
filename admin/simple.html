<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUMMY Admin - Simple</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  
  <style>
    .auth-toggle {
      margin-top: 1.5rem;
      text-align: center;
      padding-top: 1rem;
      border-top: 1px solid #e0e0e0;
    }
    
    .btn-outline {
      background: transparent;
      color: var(--primary-color);
      border: 2px solid var(--primary-color);
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    .btn-outline:hover {
      background: var(--primary-color);
      color: white;
      transform: translateY(-2px);
    }
    
    .auth-footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e0e0e0;
    }
    
    .auth-footer .btn {
      margin-top: 1rem;
      width: 100%;
    }
    
    #dashboard {
      display: none;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  
  <!-- Simple Login Form -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h2><i class="fa-solid fa-utensils"></i> Admin Login</h2>
        <p>Đăng nhập để truy cập quản lý</p>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="admin@yummy.com" />
        </div>
        
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" />
        </div>
        
        <button type="submit" class="btn btn-primary auth-btn" id="main-submit-btn">
          <i class="fa-solid fa-sign-in-alt"></i> Đăng nhập
        </button>
      </form>
      
      <div class="auth-toggle">
        <button type="button" onclick="toggleMode()" class="btn btn-outline" id="toggle-btn">
          Chưa có tài khoản? Đăng ký ngay
        </button>
      </div>
      
      <div class="auth-footer">
        <p>Demo: admin@yummy.com / password123</p>
        <button onclick="createAdminUser()" class="btn btn-secondary">
          Tạo Admin User
        </button>
      </div>
    </div>
  </div>

  <!-- Simple Dashboard (hidden initially) -->
  <div id="dashboard">
    <h1>🎉 Đăng nhập thành công!</h1>
    <p>Firebase Admin Dashboard hoạt động!</p>
    <button onclick="logout()" class="btn btn-danger">Đăng xuất</button>
  </div>

  <!-- Simple JavaScript -->
  <script type="module">
    import { YummyFirebaseService } from '../js/firebase-service.js';
    
    let firebaseService;
    let isSignUpMode = false;
    
    // Initialize
    try {
      firebaseService = new YummyFirebaseService();
      console.log('✅ Firebase service initialized:', firebaseService);
      
      // Make available globally
      window.firebaseService = firebaseService;
      
    } catch (error) {
      console.error('❌ Firebase initialization failed:', error);
      alert('❌ Firebase không thể kết nối. Kiểm tra console để xem lỗi.');
    }
    
    // Wait for DOM to be ready
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📄 DOM loaded, setting up form listener...');
      
      // Login form handler
      const loginForm = document.getElementById('login-form');
      if (!loginForm) {
        console.error('❌ Login form not found!');
        return;
      }
      
      // Prevent multiple bindings
      if (loginForm.dataset.bound === 'true') {
        console.warn('⚠️ Login form listener already bound');
      } else {
        loginForm.dataset.bound = 'true';
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('🔄 Form submitted, mode:', isSignUpMode ? 'SignUp' : 'Login');
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        console.log('📧 Email:', email);
        
        if (!firebaseService) {
          alert('❌ Firebase service chưa sẵn sàng!');
          return;
        }
      
      if (isSignUpMode) {
        // Sign Up Mode
        console.log('📝 Attempting sign up:', email);
        
        try {
          const result = await firebaseService.signUp(email, password);
          console.log('Sign up result:', result);
          
          if (result.success) {
            alert('✅ Đăng ký thành công! Tự động đăng nhập...');
            // Auto login user (already signed in after createUser)
            document.querySelector('.auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
          } else {
            if (result.code === 'auth/email-already-in-use') {
              alert('⚠️ Email đã tồn tại. Chuyển sang chế độ Đăng nhập.');
              isSignUpMode = false;
              updateFormUI();
            } else {
              alert('❌ Đăng ký thất bại: ' + result.error);
            }
          }
        } catch (error) {
          console.error('Sign up error:', error.code, error.message);
          alert(`❌ Lỗi đăng ký (${error.code || 'unknown'}): ${error.message}`);
        }
        
      } else {
        // Login Mode
        console.log('🔐 Attempting login:', email);
        
        try {
          const result = await firebaseService.signIn(email, password);
          console.log('Login result:', result);
          
          if (result.success) {
            document.querySelector('.auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            console.log('✅ Login successful!');
          } else {
            alert('❌ Đăng nhập thất bại: ' + result.error);
          }
        } catch (error) {
          console.error('Login error:', error.code, error.message);
          alert(`❌ Lỗi đăng nhập (${error.code || 'unknown'}): ${error.message}`);
        }
      }
    });
    
    // Update form UI based on mode
    function updateFormUI() {
      const submitBtn = document.getElementById('main-submit-btn');
      const toggleBtn = document.getElementById('toggle-btn');
      const title = document.querySelector('.auth-header h2');
      const subtitle = document.querySelector('.auth-header p');
      
      if (isSignUpMode) {
        submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Đăng ký tài khoản';
        toggleBtn.textContent = 'Đã có tài khoản? Đăng nhập';
        title.innerHTML = '<i class="fa-solid fa-utensils"></i> Admin Sign Up';
        subtitle.textContent = 'Tạo tài khoản admin mới';
      } else {
        submitBtn.innerHTML = '<i class="fa-solid fa-sign-in-alt"></i> Đăng nhập';
        toggleBtn.textContent = 'Chưa có tài khoản? Đăng ký ngay';
        title.innerHTML = '<i class="fa-solid fa-utensils"></i> Admin Login';
        subtitle.textContent = 'Đăng nhập để truy cập quản lý';
      }
    }
    
    // Global functions
    window.toggleMode = function() {
      isSignUpMode = !isSignUpMode;
      updateFormUI();
      console.log('🔄 Mode switched to:', isSignUpMode ? 'Sign Up' : 'Login');
    };
    
    }); // End of DOMContentLoaded
    
    window.createAdminUser = async function() {
      try {
        console.log('🔧 Creating admin user...');
        const result = await firebaseService.signUp('admin@yummy.com', 'password123', { role: 'admin', displayName: 'Administrator' });
        
        if (result.success) {
          alert('✅ Admin user created! Email: admin@yummy.com, Password: password123');
        } else {
          alert('❌ Error: ' + result.error);
        }
      } catch (error) {
        console.error('Create admin error:', error);
        alert(`❌ Error (${error.code || 'unknown'}): ${error.message}`);
      }
    };
    
    window.logout = async function() {
      try {
        await firebaseService.signOut();
        document.querySelector('.auth-container').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        console.log('✅ Logged out');
      } catch (error) {
        console.error('Logout error:', error);
      }
    };
    
  </script>

</body>
</html>
