      <div class="booking-form-container">

  <script src="../js/app.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getAnalytics, isSupported as analyticsIsSupported } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    
    const firebaseConfig={apiKey:"AIzaSyCbUNjBPEaZOtI_cNCcCJ1DBXUUdrP_6oE",authDomain:"order-yummy.firebaseapp.com",projectId:"order-yummy",storageBucket:"order-yummy.firebasestorage.app",messagingSenderId:"142798840175",appId:"1:142798840175:web:1091d97784312c1fe4089a",measurementId:"G-GQ7MEPZSSJ"};
    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Make Firebase available globally for booking.js
    window.firebaseApp = app;
    window.firebaseDb = db;
    
    analyticsIsSupported().then(s=>{if(s){getAnalytics(app);}}).catch(e=>console.warn("Analytics unavailable",e));

    // Menu loading functionality
    async function loadMenuFromFirebase() {
      const menuContainer = document.getElementById('menu-categories-container');
      
      try {
        // Load menu items from Firebase
        const menuCollectionRef = collection(db, "menuItems");
        const querySnapshot = await getDocs(menuCollectionRef);

        const allMenuItems = [];
        querySnapshot.forEach((doc) => {
          allMenuItems.push({ id: doc.id, ...doc.data() });
        });

        // Filter available items only
        const availableMenuItems = allMenuItems
          .filter(item => item.isAvailable === true)
          .sort((a, b) => {
            if (a.category !== b.category) {
              return (a.category || '').localeCompare(b.category || '');
            }
            return (a.name || '').localeCompare(b.name || '');
          });

        if (availableMenuItems.length === 0) {
          menuContainer.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-utensils" style="font-size: 4rem; color: #ccc; margin-bottom: 1rem;"></i>
              <h3 style="color: #666; margin-bottom: 0.5rem;">Chưa có món ăn nào</h3>
              <p style="color: #999;">Vui lòng quay lại sau khi nhà hàng cập nhật thực đơn.</p>
            </div>
          `;
          return;
        }

        // Group items by category
        const itemsByCategory = availableMenuItems.reduce((acc, item) => {
          const category = item.category || "Món khác";
          if (!acc[category]) {
            acc[category] = [];
          }
          acc[category].push(item);
          return acc;
        }, {});

        // Render categories
        menuContainer.innerHTML = '';
        for (const category in itemsByCategory) {
          const items = itemsByCategory[category];
          const categoryHtml = `
            <div class="menu-category">
              <h2>${category}</h2>
              <div class="menu-grid">
                ${items.map(item => createMenuItemCard(item)).join('')}
              </div>
            </div>
          `;
          menuContainer.innerHTML += categoryHtml;
        }

      } catch (error) {
        console.error("Error loading menu:", error);
        menuContainer.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;"></i>
            <h3 style="color: #666; margin-bottom: 0.5rem;">Không thể tải thực đơn</h3>
            <p style="color: #999;">Đã có lỗi kết nối. Vui lòng thử tải lại trang.</p>
            <button onclick="window.location.reload()" class="btn btn-primary" style="margin-top: 1rem;">
              <i class="fa-solid fa-refresh"></i> Tải lại
            </button>
          </div>
        `;
      }
    }

    function createMenuItemCard(item) {
      const placeholderImg = `https://placehold.co/400x300/f97316/FFFFFF?text=${encodeURIComponent(item.name)}`;
      const formatCurrency = (amount) => new Intl.NumberFormat("vi-VN", { style: "currency", currency: "VND" }).format(amount || 0);
      
      return `
        <div class="menu-card">
          <img src="${item.image || placeholderImg}" alt="${item.name}" class="menu-card-image" onerror="this.src='${placeholderImg}'">
          <div class="menu-card-body">
            <div class="menu-card-details">
              <h4>${item.name}</h4>
              <p>${item.description || 'Chưa có mô tả'}</p>
            </div>
            <div class="menu-card-price">${formatCurrency(item.price)}</div>
          </div>
          <button class="add-to-cart-btn" onclick="addToCart('${item.id}', '${item.name}', ${item.price})">
            <i class="fa-solid fa-plus"></i> Thêm vào giỏ
          </button>
        </div>
      `;
    }

    // Expose functions globally
    window.loadMenuFromFirebase = loadMenuFromFirebase;
    
    // Load menu when page loads
    document.addEventListener('DOMContentLoaded', loadMenuFromFirebase);
  </script>
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      window.cartManager=new CartManager();
      const tableGrid=document.querySelector('.table-grid');
      if(tableGrid){for(let i=1;i<=20;i++){const d=document.createElement('div');d.className='table-card';d.dataset.table=i;d.innerHTML=`<div class="table-number">${i}</div><div class="table-status">Trống</div>`;tableGrid.appendChild(d);}}
      
      // Handle tab navigation
      const navLinks = document.querySelectorAll('.nav-link');
      const pages = document.querySelectorAll('.page');
      
      function switchTab(targetPage) {
        // Remove active class from all nav links and pages
        navLinks.forEach(link => link.classList.remove('active'));
        pages.forEach(page => page.classList.remove('active'));
        
        // Activate target
        const targetLink = document.querySelector(`a[data-page="${targetPage}"]`);
        const targetPageEl = document.getElementById(`page-${targetPage}`);
        
        if (targetLink) targetLink.classList.add('active');
        if (targetPageEl) targetPageEl.classList.add('active');
      }
      
      // Handle nav clicks
      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          const page = link.getAttribute('data-page');
          if (page) {
            e.preventDefault();
            switchTab(page);
            history.pushState(null, null, `#${page}`);
          }
        });
      });
      
      // Handle hash navigation on load
      function handleHashNavigation() {
        const hash = window.location.hash.substring(1); // Remove #
        if (hash === 'booking') {
          switchTab('booking');
        } else if (hash === 'menu' || !hash) {
          switchTab('menu');
        }
      }
      
      // Handle browser back/forward
      window.addEventListener('hashchange', handleHashNavigation);
      
      // Handle initial load with hash
      handleHashNavigation();
    });
  </script>
</body>
