<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YUMMY - Menu Hôm Nay</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/menu.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-logo">
        <a href="../landing-home.html"
          ><i class="fa-solid fa-utensils"></i>YUMMY</a
        >
      </div>
      <ul class="navbar-links">
        <li>
          <a href="../landing-home.html"
            ><i class="fa-solid fa-house"></i>Trang chủ</a
          >
        </li>
        <li>
          <a href="../customer/order-booking.html"
            ><i class="fa-solid fa-bag-shopping"></i>Order</a
          >
        </li>
        <li>
          <a href="#" class="active"
            ><i class="fa-solid fa-list"></i>Menu Hôm Nay</a
          >
        </li>
        <li>
          <a href="../customer/delivery.html"
            ><i class="fa-solid fa-truck"></i>Giao hàng</a
          >
        </li>
        <li>
          <a href="../customer/order-booking.html#booking"
            ><i class="fa-solid fa-calendar-days"></i>Đặt bàn</a
          >
        </li>
      </ul>
    </nav>

    <div class="container">
      <header class="main-header">
        <h1>Menu hôm nay</h1>
        <p>Khám phá thực đơn phong phú được cập nhật trực tiếp từ bếp</p>
      </header>

      <section
        class="menu-stats"
        style="
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
          gap: 1rem;
          margin-bottom: 1.5rem;
        "
      >
        <div class="stat-card">
          <h4>Tổng món</h4>
          <div id="totalItems">0</div>
        </div>
        <div class="stat-card">
          <h4>Còn món</h4>
          <div id="availableItems">0</div>
        </div>
        <div class="stat-card">
          <h4>Hết món</h4>
          <div id="soldOutItems">0</div>
        </div>
      </section>

      <section id="menuCategories" class="menu-categories"></section>
    </div>

    <script type="module">
      // Import các module cần thiết từ Firebase SDK
      import {
        initializeApp,
        getApps,
        getApp,
      } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        query,
        where,
        orderBy,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

      // 1. CẤU HÌNH FIREBASE (Giống hệt trang Admin)
      const firebaseConfig = {
        apiKey: "AIzaSyCbUNjBPEaZOtI_cNCcCJ1DBXUUdrP_6oE",
        authDomain: "order-yummy.firebaseapp.com",
        projectId: "order-yummy",
        storageBucket: "order-yummy.firebasestorage.app",
        messagingSenderId: "142798840175",
        appId: "1:142798840175:web:1091d97784312c1fe4089a",
      };

      // 2. KHỞI TẠO FIREBASE
      const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Hàm tiện ích
      const formatCurrency = (amount) =>
        new Intl.NumberFormat("vi-VN", {
          style: "currency",
          currency: "VND",
        }).format(amount || 0);

      // 3. HÀM CHÍNH: LẤY VÀ HIỂN THỊ MENU TỪ FIRESTORE
      async function loadAndRenderMenu() {
        const menuContainer = document.getElementById("menuCategories");
        menuContainer.innerHTML = `<div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i><p>Đang tải thực đơn...</p></div>`;

        try {
          // Lấy tất cả món ăn từ collection menuItems
          const menuCollectionRef = collection(db, "menuItems");
          const querySnapshot = await getDocs(menuCollectionRef);

          const allMenuItems = [];
          querySnapshot.forEach((doc) => {
            allMenuItems.push({ id: doc.id, ...doc.data() });
          });

          // Lọc chỉ những món đang có sẵn và sắp xếp
          const availableMenuItems = allMenuItems
            .filter((item) => item.isAvailable === true)
            .sort((a, b) => {
              // Sắp xếp theo category trước, sau đó theo name
              if (a.category !== b.category) {
                return (a.category || "").localeCompare(b.category || "");
              }
              return (a.name || "").localeCompare(b.name || "");
            });

          // Cập nhật stats với tất cả món ăn
          const totalItems = allMenuItems.length;
          const availableItems = availableMenuItems.length;
          updateStats(totalItems, availableItems, totalItems - availableItems);

          // Kiểm tra và hiển thị nội dung phù hợp
          if (totalItems === 0) {
            // Chưa có món ăn nào trong hệ thống
            menuContainer.innerHTML = `
              <div class="empty-state">
                <i class="fa-solid fa-utensils" style="font-size: 4rem; color: #ccc; margin-bottom: 1rem;"></i>
                <h3 style="color: #666; margin-bottom: 0.5rem;">Thực đơn đang được chuẩn bị</h3>
                <p style="color: #999;">Chúng tôi đang cập nhật các món ăn mới. Vui lòng quay lại sau nhé!</p>
                <p style="color: #999; font-size: 0.9rem; margin-top: 1rem;">
                  <i class="fa-solid fa-clock"></i> Thời gian cập nhật: Sớm nhất có thể
                </p>
              </div>
            `;
            return;
          } else if (availableItems === 0) {
            // Có món ăn nhưng tất cả đều hết
            menuContainer.innerHTML = `
              <div class="empty-state">
                <i class="fa-solid fa-face-sad-tear" style="font-size: 4rem; color: #f59e0b; margin-bottom: 1rem;"></i>
                <h3 style="color: #666; margin-bottom: 0.5rem;">Rất tiếc, hôm nay các món đã hết</h3>
                <p style="color: #999;">Tất cả món ăn ngon đã được order hết. Vui lòng quay lại vào ngày mai!</p>
                <p style="color: #999; font-size: 0.9rem; margin-top: 1rem;">
                  <i class="fa-solid fa-heart"></i> Cảm ơn bạn đã quan tâm đến YUMMY
                </p>
              </div>
            `;
            return;
          }

          // Gom nhóm món ăn theo danh mục
          const itemsByCategory = availableMenuItems.reduce((acc, item) => {
            const category = item.category || "Chưa phân loại";
            if (!acc[category]) {
              acc[category] = [];
            }
            acc[category].push(item);
            return acc;
          }, {});

          // Tạo HTML và hiển thị
          menuContainer.innerHTML = ""; // Xóa loading
          for (const category in itemsByCategory) {
            const items = itemsByCategory[category];
            const categoryHtml = `
                    <div class="menu-category">
                        <div class="category-header">
                            <h3 class="category-title">${category}</h3>
                            <span class="category-count">${
                              items.length
                            } món</span>
                        </div>
                        <div class="category-items">
                            ${items
                              .map((item) => createItemElement(item))
                              .join("")}
                        </div>
                    </div>
                `;
            menuContainer.innerHTML += categoryHtml;
          }
        } catch (error) {
          console.error("Lỗi khi tải menu:", error);
          menuContainer.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;"></i>
              <h3 style="color: #666; margin-bottom: 0.5rem;">Không thể tải thực đơn</h3>
              <p style="color: #999;">Đã có lỗi kết nối. Vui lòng thử tải lại trang.</p>
              <button onclick="window.location.reload()" class="btn btn-primary" style="margin-top: 1rem;">
                <i class="fa-solid fa-refresh"></i> Tải lại
              </button>
            </div>
          `;
        }
      }

      // Hàm tạo HTML cho một món ăn
      function createItemElement(item) {
        const placeholderImg = `https://placehold.co/400x300/f97316/FFFFFF?text=${encodeURIComponent(
          item.name
        )}`;
        return `
            <div class="menu-item">
                <img src="${item.image || placeholderImg}" alt="${
          item.name
        }" class="item-image" onerror="this.src='${placeholderImg}'">
                <div class="item-header">
                    <h4 class="item-name">${item.name}</h4>
                    <span class="item-price">${formatCurrency(
                      item.price
                    )}</span>
                </div>
                <p class="item-description">${
                  item.description || "Chưa có mô tả"
                }</p>
                 <div class="item-actions">
                    <button class="btn btn-primary" onclick="window.location.href='../customer/order-booking.html'">
                        <i class="fa-solid fa-plus"></i> Thêm vào giỏ
                    </button>
                </div>
            </div>
        `;
      }

      // Hàm cập nhật các thẻ thống kê
      function updateStats(total, available, soldOut) {
        document.getElementById("totalItems").textContent = total;
        document.getElementById("availableItems").textContent = available;
        document.getElementById("soldOutItems").textContent = soldOut;
      }

      // Chạy hàm chính khi trang được tải
      document.addEventListener("DOMContentLoaded", loadAndRenderMenu);
    </script>
  </body>
</html>
