<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUMMY - Kitchen Display</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/kitchen.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-logo"><a href="../landing-home.html"><i class="fa-solid fa-utensils"></i>YUMMY</a></div>
    <ul class="navbar-links">
      <li><a href="../landing-home.html"><i class="fa-solid fa-house"></i>Trang chủ</a></li>
      <li><a href="../customer/order-booking.html"><i class="fa-solid fa-bag-shopping"></i>Order</a></li>
      <li><a href="../menu/public-menu.html"><i class="fa-solid fa-list"></i>Menu Hôm Nay</a></li>
      <li><a href="../customer/order-booking.html#booking"><i class="fa-solid fa-calendar-days"></i>Đặt bàn</a></li>
      <li><a class="active"><i class="fa-solid fa-fire"></i>Bếp</a></li>
      <li><a href="../admin/admin-panel.html"><i class="fa-solid fa-user-shield"></i>Admin</a></li>
      <li><a href="#" id="kitchenLogoutBtn"><i class="fa-solid fa-right-from-bracket"></i>Thoát</a></li>
    </ul>
  </nav>

  <div class="container">
    <header class="main-header"><h1>Màn hình bếp</h1><p>Theo dõi và xử lý các đơn hàng</p></header>
    <section class="kitchen-orders">
      <div class="order-status-group" data-status="pending">
        <h2><i class="fa-solid fa-hourglass-half"></i> Chờ xử lý</h2>
        <div class="orders-grid" id="orders-pending"></div>
      </div>
      <div class="order-status-group" data-status="preparing">
        <h2><i class="fa-solid fa-fire-burner"></i> Đang nấu</h2>
        <div class="orders-grid" id="orders-preparing"></div>
      </div>
      <div class="order-status-group" data-status="completed">
        <h2><i class="fa-solid fa-check"></i> Hoàn tất</h2>
        <div class="orders-grid" id="orders-completed"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
    import { getAnalytics, isSupported as analyticsIsSupported } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCbUNjBPEaZOtI_cNCcCJ1DBXUUdrP_6oE",
      authDomain: "order-yummy.firebaseapp.com",
      projectId: "order-yummy",
      storageBucket: "order-yummy.firebasestorage.app",
      messagingSenderId: "142798840175",
      appId: "1:142798840175:web:1091d97784312c1fe4089a",
      measurementId: "G-GQ7MEPZSSJ"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // Initialize analytics if supported
    analyticsIsSupported().then(supported => {
      if (supported) {
        getAnalytics(app);
      }
    }).catch(e => console.warn("Analytics unavailable", e));
    
    // Check kitchen staff authentication
    function checkKitchenAuth() {
      const kitchenStaff = localStorage.getItem('kitchenStaff');
      if (!kitchenStaff) {
        // Redirect to kitchen login if not authenticated
        window.location.href = 'kitchen-login.html';
        return false;
      }
      
      try {
        const staffData = JSON.parse(kitchenStaff);
        // Check if login is still valid (24 hours)
        const loginTime = staffData.loginTime;
        const currentTime = Date.now();
        const twentyFourHours = 24 * 60 * 60 * 1000;
        
        if (currentTime - loginTime > twentyFourHours) {
          localStorage.removeItem('kitchenStaff');
          window.location.href = 'kitchen-login.html';
          return false;
        }
        
        return true;
      } catch (e) {
        localStorage.removeItem('kitchenStaff');
        window.location.href = 'kitchen-login.html';
        return false;
      }
    }
    
    // Check authentication on page load
    if (!checkKitchenAuth()) {
      // Don't continue if not authenticated
    } else {
      // Kitchen logout functionality
      const btn = document.getElementById('kitchenLogoutBtn');
      if (btn) {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          try {
            await signOut(auth);
            localStorage.removeItem('kitchenStaff');
            alert('Đã đăng xuất khỏi hệ thống bếp');
            window.location.href = 'kitchen-login.html';
          } catch (error) {
            console.warn('Logout failed', error);
            localStorage.removeItem('kitchenStaff');
            window.location.href = 'kitchen-login.html';
          }
        });
      }
    }
  </script>
</body>
</html>
