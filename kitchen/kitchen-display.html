<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YUMMY - Kitchen Display</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/kitchen.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-logo">
        <a href="../landing-home.html"
          ><i class="fa-solid fa-utensils"></i>YUMMY</a
        >
      </div>
      <ul class="navbar-links">
        <li>
          <a href="../landing-home.html"
            ><i class="fa-solid fa-house"></i>Trang chủ</a
          >
        </li>
        <li>
          <a href="../customer/order-booking.html"
            ><i class="fa-solid fa-bag-shopping"></i>Order</a
          >
        </li>
        <li>
          <a href="../menu/public-menu.html"
            ><i class="fa-solid fa-list"></i>Menu Hôm Nay</a
          >
        </li>
        <li>
          <a href="../customer/order-booking.html#booking"
            ><i class="fa-solid fa-calendar-days"></i>Đặt bàn</a
          >
        </li>
        <li>
          <a class="active"><i class="fa-solid fa-fire"></i>Bếp</a>
        </li>
        <li>
          <a href="../admin/admin-panel.html"
            ><i class="fa-solid fa-user-shield"></i>Admin</a
          >
        </li>
        <li>
          <a href="#" id="kitchenLogoutBtn"
            ><i class="fa-solid fa-right-from-bracket"></i>Thoát</a
          >
        </li>
      </ul>
    </nav>

    <div class="container">
      <header class="main-header">
        <h1>Màn hình bếp</h1>
        <p>Theo dõi và xử lý các đơn hàng</p>
      </header>
      <section class="kitchen-orders">
        <div class="order-status-group" data-status="pending">
          <h2><i class="fa-solid fa-hourglass-half"></i> Chờ xử lý</h2>
          <div class="orders-grid" id="orders-pending"></div>
        </div>
        <div class="order-status-group" data-status="preparing">
          <h2><i class="fa-solid fa-fire-burner"></i> Đang nấu</h2>
          <div class="orders-grid" id="orders-preparing"></div>
        </div>
        <div class="order-status-group" data-status="completed">
          <h2><i class="fa-solid fa-check"></i> Hoàn tất</h2>
          <div class="orders-grid" id="orders-completed"></div>
        </div>
      </section>
    </div>

    <script type="module">
      // Redirect to admin panel - Kitchen is now integrated into admin
      alert("Trang bếp đã được tích hợp vào Admin Panel. Đang chuyển hướng...");
      window.location.href = "../admin/admin-panel.html";
    </script>
  </body>
</html>
