<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUMMY Kitchen - Bếp Hiển Thị</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/kitchen.css" />
</head>
<body>
  <!-- Kitchen Header -->
  <header class="kitchen-header">
    <div class="header-container">
      <div class="kitchen-logo">
        <i class="fas fa-utensils"></i>
        <h1>YUMMY Kitchen Display</h1>
      </div>
      
      <div class="kitchen-stats">
        <div class="stat-card">
          <span class="stat-number" id="pendingOrders">0</span>
          <span class="stat-label">Đơn Chờ</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="cookingOrders">0</span>
          <span class="stat-label">Đang Làm</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="completedToday">0</span>
          <span class="stat-label">Hoàn Thành</span>
        </div>
      </div>
      
      <div class="kitchen-controls">
        <div class="current-time" id="currentTime"></div>
        <button class="btn btn-success" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
        <button class="btn btn-secondary" id="settingsBtn">
          <i class="fas fa-cog"></i> Cài Đặt
        </button>
      </div>
    </div>
  </header>

  <!-- Kitchen Main Content -->
  <main class="kitchen-main">
    <div class="container">
      
      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">
          <i class="fas fa-list"></i> Tất Cả Đơn
        </button>
        <button class="tab-btn" data-filter="pending">
          <i class="fas fa-clock"></i> Chờ Làm (<span id="pendingCount">0</span>)
        </button>
        <button class="tab-btn" data-filter="cooking">
          <i class="fas fa-fire"></i> Đang Làm (<span id="cookingCount">0</span>)
        </button>
        <button class="tab-btn" data-filter="ready">
          <i class="fas fa-check"></i> Sẵn Sàng (<span id="readyCount">0</span>)
        </button>
      </div>

      <!-- Orders Grid -->
      <div class="orders-grid" id="ordersGrid">
        <!-- Order cards will be dynamically generated here -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-utensils"></i>
        <h3>Không có đơn hàng nào</h3>
        <p>Tất cả đơn hàng đã được hoàn thành hoặc chưa có đơn mới</p>
      </div>

    </div>
  </main>

  <!-- Order Detail Modal -->
  <div class="modal" id="orderDetailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Chi Tiết Đơn Hàng</h3>
        <button class="modal-close" id="closeOrderDetail">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body" id="orderDetailBody">
        <!-- Order details will be populated here -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="closeOrderDetailBtn">Đóng</button>
      </div>
    </div>
  </div>

  <!-- Kitchen Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Cài Đặt Bếp</h3>
        <button class="modal-close" id="closeSettings">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="autoRefresh">Tự động refresh (giây):</label>
          <select id="autoRefresh">
            <option value="0">Tắt</option>
            <option value="10">10 giây</option>
            <option value="30" selected>30 giây</option>
            <option value="60">60 giây</option>
          </select>
        </div>
        
        <div class="setting-group">
          <label for="soundNotification">Âm thanh thông báo:</label>
          <input type="checkbox" id="soundNotification" checked>
        </div>
        
        <div class="setting-group">
          <label for="orderDisplay">Hiển thị đơn hàng:</label>
          <select id="orderDisplay">
            <option value="grid">Lưới</option>
            <option value="list">Danh sách</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveSettings">Lưu Cài Đặt</button>
        <button class="btn btn-secondary" id="closeSettingsBtn">Đóng</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/app.js"></script>
  <script src="../js/shared-menu.js"></script>
  <script src="../js/kitchen.js"></script>

  <script>
    // Initialize Kitchen Display
    document.addEventListener('DOMContentLoaded', function() {
      window.kitchenManager = new KitchenManager();
    });
  </script>
</body>
</html>
