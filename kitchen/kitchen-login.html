<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUMMY - Kitchen Staff Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .kitchen-login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }
    
    .kitchen-login-card {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .kitchen-login-header {
      margin-bottom: 2rem;
    }
    
    .kitchen-login-header i {
      font-size: 4rem;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }
    
    .kitchen-login-header h2 {
      color: var(--text-color);
      margin-bottom: 0.5rem;
    }
    
    .kitchen-login-header p {
      color: var(--text-light-color);
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-color);
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    
    .kitchen-login-btn {
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1rem;
    }
    
    .kitchen-login-btn:hover {
      background: #e64a19;
      transform: translateY(-2px);
    }
    
    .kitchen-login-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }
    
    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    
    .back-to-home:hover {
      color: var(--primary-color);
    }
    
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="kitchen-login-container">
    <div class="kitchen-login-card">
      <div class="kitchen-login-header">
        <i class="fa-solid fa-fire"></i>
        <h2>Đăng nhập Bếp</h2>
        <p>Dành cho nhân viên bếp</p>
      </div>
      
      <div class="error-message" id="error-message"></div>
      
      <form id="kitchen-login-form">
        <div class="form-group">
          <label for="kitchen-email">Email</label>
          <input type="email" id="kitchen-email" required placeholder="kitchen@yummy.vn" />
        </div>
        <div class="form-group">
          <label for="kitchen-password">Mật khẩu</label>
          <input type="password" id="kitchen-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="kitchen-login-btn" id="kitchen-login-btn">
          <i class="fa-solid fa-sign-in-alt"></i> Đăng nhập
        </button>
      </form>
      
      <a href="../landing-home.html" class="back-to-home">
        <i class="fa-solid fa-arrow-left"></i>
        Về trang chủ
      </a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
    import { getAnalytics, isSupported as analyticsIsSupported } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbUNjBPEaZOtI_cNCcCJ1DBXUUdrP_6oE",
      authDomain: "order-yummy.firebaseapp.com",
      projectId: "order-yummy",
      storageBucket: "order-yummy.firebasestorage.app",
      messagingSenderId: "142798840175",
      appId: "1:142798840175:web:1091d97784312c1fe4089a",
      measurementId: "G-GQ7MEPZSSJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Initialize analytics if supported
    analyticsIsSupported().then(supported => {
      if (supported) {
        getAnalytics(app);
      }
    }).catch(e => console.warn("Analytics unavailable", e));

    // Kitchen login form
    const loginForm = document.getElementById('kitchen-login-form');
    const loginBtn = document.getElementById('kitchen-login-btn');
    const errorMessage = document.getElementById('error-message');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
    }

    function hideError() {
      errorMessage.style.display = 'none';
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      
      const email = document.getElementById('kitchen-email').value;
      const password = document.getElementById('kitchen-password').value;
      
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang đăng nhập...';
      
      try {
        // Kitchen staff authentication
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Store kitchen login info
        localStorage.setItem('kitchenStaff', JSON.stringify({
          uid: user.uid,
          email: user.email,
          loginTime: Date.now()
        }));
        
        // Redirect to kitchen display
        window.location.href = 'kitchen-display.html';
        
      } catch (error) {
        console.error('Kitchen login error:', error);
        
        let errorMsg = 'Đăng nhập thất bại. Vui lòng thử lại.';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMsg = 'Email hoặc mật khẩu không đúng.';
        } else if (error.code === 'auth/invalid-email') {
          errorMsg = 'Email không hợp lệ.';
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = 'Quá nhiều lần thử. Vui lòng đợi một lúc.';
        }
        
        showError(errorMsg);
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fa-solid fa-sign-in-alt"></i> Đăng nhập';
      }
    });
  </script>
</body>
</html>
