<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>YUMMY – Redirect</title><meta name="robots" content="noindex"/><style>html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f5f7fa;color:#222;display:flex;align-items:center;justify-content:center}.card{background:#fff;padding:2.2rem 2.4rem;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.06);max-width:340px;width:92%;text-align:center;animation:fade .5s ease}h1{margin:0 0 .75rem;font-size:1.35rem;letter-spacing:.5px;font-weight:600}p{margin:.35rem 0;font-size:.85rem;opacity:.72}small{display:block;margin-top:1rem;font-size:.65rem;letter-spacing:.5px;opacity:.55}.bar-outer{height:8px;background:#eef1f4;border-radius:6px;overflow:hidden;margin:1.15rem 0 .25rem}.bar{height:100%;width:0;background:linear-gradient(90deg,#ff7a45,#ff5c35);animation:load 1.1s cubic-bezier(.65,.05,.36,1) forwards}.pulse{animation:pulse 1.5s ease-in-out infinite}@keyframes load{to{width:100%}}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:.85}}</style></head><body><div class="card" role="status" aria-live="polite"><h1>Đang chuyển hướng…</h1><p>Chuẩn bị nội dung phù hợp cho bạn</p><div class="bar-outer"><div class="bar"></div></div><p class="pulse" id="hint">Vui lòng đợi giây lát</p><small>YUMMY Router</small></div><script>(()=>{const KEY='yummyVisitCount';const rawPath=location.pathname;const norm=rawPath.replace(/\/+/g,'/');const isRoot= norm==='/' || /\/index\.html$/.test(norm);if(!isRoot){console.debug('[YUMMY Router] No redirect (not root):',norm);return;}const FIRST='landing-home.html';const RETURNING='customer/order-booking.html';let count=parseInt(localStorage.getItem(KEY)||'0',10);if(isNaN(count)) count=0;count+=1;localStorage.setItem(KEY,String(count));const target=count===1?FIRST:RETURNING;console.debug('[YUMMY Router] visit',count,'→',target);setTimeout(()=>{ if(location.pathname.endsWith(target)) return; location.replace('/'+target); },480);})();</script></body></html>
